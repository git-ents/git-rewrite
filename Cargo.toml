[workspace]
resolver = "3"
members = ["."]

[workspace.package]
edition = "2024"
publish = false
license = "MIT OR Apache-2.0"

[workspace.dependencies]
clap = { version = "4.5.60", features = ["derive"] }
git2 = "0.20.4"
globset = "0.4.18"
clap_mangen = "0.2.31"

[package]
name = "git-filter"
version = "0.0.0"
edition.workspace = true
publish.workspace = true
license.workspace = true

[lib]
path = "src/lib.rs"

[[bin]]
name = "git-filter"
path = "src/main.rs"

[dependencies]
clap.workspace = true
git2.workspace = true
globset.workspace = true

[build-dependencies]
clap_mangen.workspace = true
